<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>claudeflare</title>
    <link rel="preload" as="image" href="hero.png" fetchpriority="high" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #111;
      }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      img {
        display: block;
        width: 100vw;
        height: 100dvh;
        aspect-ratio: 16 / 9;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
        pointer-events: none;
      }

      @media (max-width: 768px) and (orientation: portrait) {
        img {
          width: 100dvh;
          height: auto;
          max-width: none;
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%) rotate(-90deg);
        }
      }

    </style>
  </head>
  <body>
    <img src="hero.png" alt="Claudeflare hero image" width="1672" height="941" loading="eager" decoding="async" fetchpriority="high" draggable="false" />
  </body>
</html>
